name: Bug report
description: Something isn’t working
title: '[Bug]: '
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this.

        Built by [Ethos Link](https://www.ethos-link.com), the team behind [Reviato](https://www.reviato.com).
        Capture. Interpret. Act.
        Turn guest feedback into clear next steps for your team. Collect private appraisals, spot patterns across reviews, and act before small issues turn into public ones.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see? Include any error messages.
      placeholder: 'Describe the issue clearly…'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: 'Expected behavior…'
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide the exact command(s) you ran and anything else needed.
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste the relevant output. (Redact tokens.)
      render: shell

  - type: input
    id: version
    attributes:
      label: Version
      description: Project, package, or gem version if applicable
      placeholder: '0.1.0'
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Ruby version, GitHub.com vs Enterprise (no secrets)
      placeholder: |
        OS:
        Ruby:
        Git:
        GitHub:
    validations:
      required: false
